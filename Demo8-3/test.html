<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .letter-overlay {
            display: none; /* Ẩn ban đầu */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .letter-content {
            background: #fff9ed; /* Màu giấy cũ */
            width: 80%;
            max-width: 400px;
            padding: 40px;
            border-radius: 5px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Khi lá thư được mở */
        .letter-overlay.active {
            display: flex;
        }
        .letter-overlay.active .letter-content {
            transform: scale(1);
        }

        .letter-text {
            font-family: 'Dancing Script', cursive; /* Bạn có thể thêm font chữ viết tay */
            line-height: 1.6;
            color: #444;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 25px;
            cursor: pointer;
        }   
    </style>
</head>
<body>
    <div>
        <img src="anh/mailbox.png" alt="Mailbox" id="mailbox">
        <div id="letterWrapper" class="letter-overlay">
    <div class="letter-content">
        <span class="close-btn">&times;</span>
        <div class="letter-text">
            <h2>Gửi bạn thân mến,</h2>
            <p>Chào mừng bạn đã đến với Bình Nguyên Xanh! Chúc bạn có một ngày thật nhiều niềm vui và bình yên bên ngôi nhà nhỏ của mình. 🌸</p>
            <p style="text-align: right;">— Từ Gemini —</p>
        </div>
    </div>
</div>

    </div>
    <script>
        const mailboxBtn = document.querySelector('#mailbox');
        const letterOverlay = document.getElementById('letterWrapper');
        const closeBtn = document.querySelector('.close-btn');

        // Giả sử bạn gán sự kiện này cho mailbox hoặc bất kỳ layer nào
        // Ở đây tôi ví dụ click vào imageWrapper (khung chứa ảnh)
        mailboxBtn.addEventListener('click', () => {
            // Hiện lá thư sau một nhịp delay nhỏ (để hoa rơi xong mới hiện thư)
            setTimeout(() => {
                letterOverlay.classList.add('active');
            }, 500);
        });

        // Đóng lá thư
        closeBtn.onclick = () => {
            letterOverlay.classList.remove('active');
        };

        // Đóng khi click ra ngoài vùng lá thư
        window.onclick = (event) => {
            if (event.target == letterOverlay) {
                letterOverlay.classList.remove('active');
            }
        };
    </script>
    
</body>
</html>
