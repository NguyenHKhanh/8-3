<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day</title>
    <style>       
    body, html {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        background-color: #ffdee3;
    }

    .main-container {
        width: 90%; max-width: 800px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden; 
        box-sizing: border-box;
    }

    .image-wrapper {
        width: 100%;
        height: 550px; 
        position: relative; 
    }

    .responsive-image {
        width: 100%;
        height: 100%;
        object-fit: cover; 
        display: block;
    }


    .base-layer {
        position: relative; 
        z-index: 1; 
    }

    .top-layer-1 {
        position: absolute; 
        bottom: 0;   
        z-index: 2; 
        width: 20%;
        height: auto;
        right: 40%;
        filter: drop-shadow(10px 10px 15px rgba(0,0,0,0.3));
    }


    .top-layer-2 {
        position: absolute; 
        bottom: 0;   
        z-index: 2; 
        width: 17%;
        height: auto;
        right: 15%;
        filter: drop-shadow(10px 10px 15px rgba(0,0,0,0.3));
    }

    .content {
        padding: 20px;
        text-align: center;
    }

    @media (max-width: 700px) {
        .image-wrapper {
            height: 300px; 
        }
    }

    .top-layer-1:hover {
    filter: brightness(1.5) ;
    transform: scale(1.02) translateY(-5px);
    transition: all 0.3s ease;
    } 

    .top-layer-2:hover {
        filter: brightness(1.4) ;
        transform:  scale(1.02) translateY(-5px);
        transition: all 0.3s ease;
    } 


    .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100; /* Luôn nằm trên cùng */
        background: rgba(255, 255, 255, 0.5);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255,255,255,0.3);
    }

    .music-btn:hover {
        transform: scale(1.1);
        background: rgba(255, 255, 255, 0.8);
    }

    .flower{
    position:absolute;
    top:0;
    font-size:20px;
    animation:fall linear infinite;
    opacity:0.8;
    z-index: 100;
    }
    @keyframes fall{
        to{
            transform:translateY(70vh) rotate(360deg);
            opacity:0;
        }
    }
   
    </style>  
</head>
<body>
    <div class="main-container">
        <div class="image-wrapper">
            <img src="anh/background.png" class="responsive-image base-layer" alt="Bg">
            
            <img src="anh/boy.png" class="responsive-image top-layer-1" alt="Boy">
            
            <img src="anh/mailbox.png" class="responsive-image top-layer-2" alt="Mailbox">
        </div>
    </div>      
    <audio id="bgMusic" loop>
            <source src="anh/nhac.mp3" type="audio/mpeg" volume="0.5">
    </audio>

    <div id="musicControl" class="music-btn">
        <span id="musicIcon">🔇</span>
</div>        

    <script>
        const mailboxBtn = document.querySelector('.top-layer-2');

        mailboxBtn.addEventListener('click', () => {
            const userChoice = confirm("Bạn có một lá thư mới! Bạn có muốn mở nó ngay bây giờ không?"); 
            if (userChoice) {
                const letterOverlay = document.getElementById('letterWrapper');
                letterOverlay.classList.add('active');
            }
        });     
        mailboxBtn.addEventListener('mouseup', () => {
            mailboxBtn.src = 'anh/mailbox.png';
        });
        
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        function playMusic() {
            bgMusic.play().then(() => {
                musicIcon.innerText = '🔊';
            }).catch(error => {
                console.log("Trình duyệt chặn tự động phát. Chờ tương tác người dùng...");
            });
        }
        window.addEventListener('load', playMusic);
        document.addEventListener('click', () => {
            if (bgMusic.paused) {
                playMusic();
            }
        }, { once: true }); 
        musicControl.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (bgMusic.paused) {
                bgMusic.play();
                musicIcon.innerText = '🔊';
            } else {
                bgMusic.pause();
                musicIcon.innerText = '🔇';
            }
        });
        function createFlowers(){
            for(let i=0;i<30;i++){
                let flower=document.createElement("div");
                flower.className="flower";
                flower.innerHTML="🌸";
                flower.style.left=Math.random()*100+"vw";
                flower.style.animationDuration=(Math.random()*5+5)+"s";
                flower.style.fontSize=(Math.random()*20+15)+"px";
                document.body.appendChild(flower);

            setTimeout(()=>{flower.remove();},10000);
            }
        }
        createFlowers();
        setInterval(createFlowers,8000);

    </script>
</body>
</html>
